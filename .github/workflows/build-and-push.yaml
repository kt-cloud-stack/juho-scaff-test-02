name: build-and-push

# 수동 실행만 허용 — scaffolder 가 파일을 커밋할 때 자동 트리거되지 않도록
# push 트리거는 의도적으로 제외했다. 필요 시 아래 push 블록을 활성화하세요.
on:
  workflow_dispatch: {}
  # push:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t harbor-cicd.ktcloud.com/development/juho-scaf-test:${GITHUB_SHA::7} .
      # NOTE: push 단계는 레지스트리 자격증명(secrets) 설정 후 활성화하세요.
      # - name: Push image
      #   run: docker push harbor-cicd.ktcloud.com/development/juho-scaf-test:${GITHUB_SHA::7}
